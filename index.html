<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最小構成P2Pチャット</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; color: #333; }
        #log { border: 1px solid #ccc; height: 250px; overflow-y: auto; margin: 20px auto; padding: 10px; text-align: left; max-width: 400px; background: #fefefe; }
        input { padding: 8px; width: 250px; border: 1px solid #bbb; border-radius: 4px; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        #qrcode img { margin: 0 auto; }
    </style>
</head>
<body>

    <h2 id="status">起動中...</h2>

    <div id="setup">
        <div id="qrcode"></div>
        <p id="instruction">準備しています...</p>
    </div>

    <div id="chat" style="display:none;">
        <div id="log"></div>
        <input type="text" id="messageInput" placeholder="メッセージを入力">
        <button onclick="sendMsg()">送信</button>
    </div>

    <script>
        const partnerId = new URLSearchParams(window.location.search).get('id');
        const peer = new Peer();
        let conn;

        // Peerの準備完了時
        peer.on('open', (myId) => {
            if (partnerId) {
                // 【スマホ側：ゲスト】
                document.getElementById("status").textContent = "PCに接続しています...";
                document.getElementById("instruction").textContent = "接続を確立中...";
                conn = peer.connect(partnerId);
                setupConn();
            } else {
                // 【PC側：ホスト】
                const url = window.location.href.split('?')[0] + '?id=' + myId;
                new QRCode(document.getElementById("qrcode"), url);
                document.getElementById("status").textContent = "接続待ち";
                document.getElementById("instruction").textContent = "スマホでこのQRをスキャンしてください";
            }
        });

        // 【PC側】接続が来た時の処理
        peer.on('connection', (c) => {
            conn = c;
            setupConn();
        });

        function setupConn() {
            // UIをチャット画面に切り替える関数
            const startChat = () => {
                document.getElementById("status").textContent = "接続完了！";
                document.getElementById("setup").style.display = "none";
                document.getElementById("chat").style.display = "block";
            };

            // すでに接続が開いているかチェック（タイミング問題対策）
            if (conn.open) {
                startChat();
            } else {
                conn.on('open', startChat);
            }

            // メッセージ受信
            conn.on('data', (data) => {
                addLog("相手: " + data);
            });

            conn.on('close', () => {
                alert("接続が切れました。ページを更新してください。");
            });
        }

        function sendMsg() {
            const input = document.getElementById("messageInput");
            if (conn && conn.open && input.value) {
                conn.send(input.value);
                addLog("自分: " + input.value);
                input.value = "";
            }
        }

        function addLog(text) {
            const log = document.getElementById("log");
            const div = document.createElement("div");
            div.textContent = text;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        // Enterキー対応
        document.getElementById("messageInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMsg();
        });
    </script>
</body>
</html>
