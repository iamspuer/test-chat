<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最小構成チャット(修正版)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <h2 id="title">最小構成チャット</h2>
    <div id="status" style="color: blue;">起動中...</div>
    
    <div id="setup">
        <div id="qrcode"></div>
    </div>

    <div id="chat" style="display:none;">
        <input type="text" id="messageInput" placeholder="文字を入力">
        <button onclick="sendMsg()">送信</button>
        <div id="log" style="border:1px solid #ccc; margin-top:10px; height:200px; overflow-y:auto; padding:5px;"></div>
    </div>

    <script>
        // URLに「?id=xxx」が入っているかチェック（スマホ側の判断基準）
        const partnerId = new URLSearchParams(window.location.search).get('id');
        const peer = new Peer();
        let conn;

        // Peerの準備ができたら実行
        peer.on('open', (myId) => {
            if (partnerId) {
                // 【スマホ側（ゲスト）】
                document.getElementById("status").textContent = "PCに接続を試みています...";
                conn = peer.connect(partnerId);
                setupConn();
            } else {
                // 【PC側（ホスト）】
                const url = window.location.href.split('?')[0] + '?id=' + myId;
                document.getElementById("qrcode").innerHTML = ""; // 念のためクリア
                new QRCode(document.getElementById("qrcode"), url);
                document.getElementById("status").textContent = "スマホでスキャンしてください (ID: " + myId + ")";
            }
        });

        // 【PC側】スマホからの接続を検知したとき
        peer.on('connection', (c) => {
            conn = c;
            setupConn();
        });

        // 共通：通信のセットアップ
        function setupConn() {
            // 通信路が開いたら画面を切り替える
            conn.on('open', () => {
                document.getElementById("status").textContent = "接続完了！";
                document.getElementById("setup").style.display = "none";
                document.getElementById("chat").style.display = "block";
            });

            // メッセージ受信
            conn.on('data', (data) => {
                addLog("相手: " + data);
            });
        }

        function sendMsg() {
            const msg = document.getElementById("messageInput").value;
            if (conn && conn.open) {
                conn.send(msg);
                addLog("自分: " + msg);
                document.getElementById("messageInput").value = "";
            }
        }

        function addLog(text) {
            const div = document.createElement("div");
            div.textContent = text;
            document.getElementById("log").appendChild(div);
        }
    </script>
</body>
</html>
